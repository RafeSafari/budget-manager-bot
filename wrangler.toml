name = "budget-manager-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "budget-bot-db"
database_id = "5a29418c-3be6-4d0c-91da-c12bbfb6d270"

# Cron Triggers - runs every minute to check scheduled summaries
[triggers]
crons = ["* * * * *"]

# Required secrets (set via: npx wrangler secret put BOT_TOKEN)
# BOT_TOKEN - Telegram bot token
# OPENCODE_API_KEY - OpenCode Zen API key

# Optional vars (defaults shown)
[vars]
OPENCODE_MODEL = "deepseek-v4-flash-free"
BOT_INFO = "{\"id\":8805671677,\"is_bot\":true,\"first_name\":\"Budget Analyzer AI Bot\",\"username\":\"budget_analyzer_ai_bot\",\"can_join_groups\":true,\"can_read_all_group_messages\":false,\"supports_inline_queries\":false,\"supports_guest_queries\":false,\"can_connect_to_business\":false,\"has_main_web_app\":false,\"has_topics_enabled\":false,\"allows_users_to_create_topics\":false,\"can_manage_bots\":false}"
